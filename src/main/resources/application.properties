# Application
spring.application.name=demo2

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/tp1?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=ahlem2003
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# ? Supprime cette ligne, Hibernate la dťtecte automatiquement (warning dans les logs)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Server Configuration
server.port=8088
server.servlet.context-path=/tp1

# GraphQL Configuration
spring.graphql.path=/graphql
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql

# WebSocket GraphQL (subscriptions)
spring.graphql.websocket.path=/graphql-ws

# Keycloak / OAuth2
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/demo-realm/protocol/openid-connect/certs

# Logging
logging.level.org.springframework.graphql=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.example.demo=DEBUG
# Client Credentials
app.security.client-id=demo-client
app.security.client-secret=demo-secret-2024
# application.properties
spring.graphql.cors.allowed-origins=http://localhost:5173
spring.graphql.cors.allowed-methods=GET,POST,OPTIONS
spring.graphql.cors.allowed-headers=*
spring.graphql.cors.allow-credentials=true
spring.graphql.cors.max-age=3600